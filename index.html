<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcello Henrique | Desenvolvedor Web</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #3b82f6;
    margin-bottom:15px;
}

h1{
    color:white;
    font-size:1.6rem;
}

.subtitle{
    color:#60a5fa;
    margin-top:5px;
    font-weight:500;
}

.description{
    color:#cbd5e1;
    font-size:.9rem;
    margin-top:15px;
    line-height:1.6;
}

.links{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link{
    text-decoration:none;
    color:white;
    background:rgba(59,130,246,.15);
    border:1px solid rgba(59,130,246,.35);
    padding:16px;
    border-radius:16px;
    transition:.3s;
    font-weight:600;
}

.link:hover{
    transform:translateY(-3px);
    background:#3b82f6;
}

.footer{
    margin-top:25px;
    color:#94a3b8;
    font-size:.8rem;
}

</style>
</head>
<body>

<div class="container">
    <div class="card">

        <img
        src="foto minha.jpeg"
        class="profile"
        alt="Foto de perfil">

        <h1>Marcello henrique</h1>

        <p class="subtitle">
            Desenvolvedor Web
        </p>

        <p class="description">
            Criação de sites profissionais,
            landing pages e páginas de links
            personalizadas para empresas e
            empreendedores.
        </p>

        <div class="links">

            <a class="link"
            href="https://wa.me/qr/DL3UT5E3K7ANI1">
            📱 WhatsApp
            </a>

        

            <a class="link"
            href="https://www.instagram.com/marcelloh.dev?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==">
            📸 Instagram
            </a>

           
            <a class="link"
            href="https://mail.google.com/mail/?view=cm&fs=1&to=marcelloh150501@gmail.com"
            target="_blank">
            📧 E-mail marcelloh150501@gmail.com
            </a>

        </div>

        <div class="footer">
            © 2026 Marcello Henrique
        </div>

    </div>
</div>

</body>
</html>
